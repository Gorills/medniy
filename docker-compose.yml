services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medniy-app
    restart: unless-stopped
    volumes:
      - ./.env:/var/www/html/.env
      - ./public:/var/www/html/public
      - ./storage:/var/www/html/storage
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: cache
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - app-net
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  web:
    image: nginx:1.25-alpine
    container_name: medniy-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-net

  db:
    image: mysql:8.0
    container_name: medniy-db
    restart: unless-stopped
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-medniy}
      MYSQL_USER: ${DB_USERNAME:-medniy}
      MYSQL_PASSWORD: ${DB_PASSWORD:?Задайте DB_PASSWORD в .env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Задайте MYSQL_ROOT_PASSWORD в .env}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
    networks:
      - app-net
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  cache:
    image: redis:7-alpine
    container_name: medniy-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - cache_data:/data
    networks:
      - app-net

  cron:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medniy-cron
    restart: unless-stopped
    entrypoint: []
    command: >
      sh -c "echo '* * * * * cd /var/www/html && php artisan schedule:run >> /proc/1/fd/1 2>&1'
      | crontab -u www-data - && cron -f"
    user: root
    volumes:
      - ./.env:/var/www/html/.env
      - ./storage:/var/www/html/storage
    env_file:
      - .env
    environment:
      DB_HOST: db
      REDIS_HOST: cache
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - app-net

volumes:
  db_data:
  cache_data:

networks:
  app-net:
    driver: bridge
